services:
  revers-proxy:
    image: nginx:1.30-alpine
    ports:
      - "80:80"
    container_name: revers-proxy
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro 
    restart: unless-stopped
    networks:
      - proxy-back   

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend
    restart: unless-stopped
    networks:
      - proxy-back

networks:
  proxy-back: